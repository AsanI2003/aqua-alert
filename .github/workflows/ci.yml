name: Aqua-Alert CI
on:
  pull_request:
    branches: [develop] # This runs when you open a PR to develop

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx tsc --noEmit # Checks for TypeScript errors
        